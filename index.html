<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Urban Innovations — Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#111;font-family:Georgia,serif}
body{display:flex;align-items:center;justify-content:center;flex-direction:column;min-height:100vh}
.box{background:#1a1a1a;border:1px solid #aa710a;padding:48px 40px 40px;width:340px;text-align:center;box-shadow:0 0 60px rgba(0,0,0,.8)}
.brand{color:#aa710a;font-size:12px;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px}
h1{color:#ffffff;font-size:20px;font-weight:normal;letter-spacing:1px;margin-bottom:28px}
.line{width:40px;height:1px;background:#aa710a;margin:0 auto 24px}
.label{color:#777;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
input{width:100%;background:#111;border:1px solid #333;color:#fff;padding:13px 14px;font-size:14px;letter-spacing:1px;outline:none;font-family:Georgia,serif;display:block;margin-bottom:12px}
input:focus{border-color:#aa710a}
button{width:100%;background:#aa710a;color:#fff;border:none;padding:14px;font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:Georgia,serif}
button:hover{background:#c08830}
.error{color:#e74c3c;font-size:12px;letter-spacing:1px;margin-top:12px;min-height:16px}
.footer{color:#333;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-top:32px}
</style>
</head>
<body>
<div class="box">
  <div class="brand">Urban Innovations</div>
  <div class="line"></div>
  <h1>Preview Access</h1>
  <div class="label">Enter password to continue</div>
  <input type="password" id="pw" placeholder="Password" autocomplete="off" />
  <button onclick="check()">Enter Site</button>
  <div class="error" id="err"></div>
</div>
<div class="footer">Confidential Preview &mdash; Not for Distribution</div>

<script>
document.getElementById('pw').addEventListener('keydown', function(e){
  if(e.key === 'Enter') check();
});
function check(){
  var pw = document.getElementById('pw').value;
  if(pw === 'Urban-Innovations.comIsC0ol'){
    sessionStorage.setItem('ui_preview_auth','1');
    window.location.href = 'home.html';
  } else {
    document.getElementById('err').textContent = 'Incorrect password. Please try again.';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
</script>
</body>
</html>
